appId: com.linguflow.desktop
productName: LinguaFlow
directories:
  buildResources: build
  output: release
files:
  - out/**
  - build/icon.png
  - package.json
extraResources:
  - from: ../audio-sidecar/bin/Release/net8.0/win-x64/publish/
    to: audio-sidecar
    filter:
      - "**/*"
win:
  icon: build/icon.ico
  target:
    - nsis
    - zip
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
